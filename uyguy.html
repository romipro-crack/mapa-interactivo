<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <hreft link="styles.css"
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Base inicial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>
    
<button onclick="limpiarMapa()">Limpiar mapa</button>
<div id="map" style="height:500px;"></div>

<script>
var map = L.map('map').setView([-34.6, -58.4], 13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var capas = L.featureGroup().addTo(map);

// ejemplo de elementos
L.marker([-34.6, -58.4]).addTo(capas);
L.polyline([[-34.6,-58.4],[-34.61,-58.39]]).addTo(capas);
L.polygon([[-34.62,-58.42],[-34.63,-58.41],[-34.61,-58.40]]).addTo(capas);

function limpiarMapa(){
    capas.clearLayers();
}
</script>
    <script src="script.js"></script>
</body>
</html>
